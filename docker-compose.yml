services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2.0
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 12
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    # Порт 5432 наружу НЕ пробрасывается — только внутренняя docker-сеть

  app:
    build:
      context: .
      dockerfile: app/Dockerfile
      args:
        NEXT_PUBLIC_DONATION_URL: ${NEXT_PUBLIC_DONATION_URL:-}
    restart: unless-stopped
    mem_limit: 1g
    cpus: 2.0
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}
      AUTH_SECRET: ${AUTH_SECRET}
      AUTH_URL: ${AUTH_URL}
      AUTH_TRUST_HOST: "true"
      ADMIN_EMAIL: ${ADMIN_EMAIL}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      # SpeechKit доступен только серверному admin API; в NEXT_PUBLIC_* ключ не попадает.
      YANDEX_SPEECHKIT_API_KEY: ${YANDEX_SPEECHKIT_API_KEY:-}
      YANDEX_SPEECHKIT_API_KEY_ID: ${YANDEX_SPEECHKIT_API_KEY_ID:-}
      FEATURE_ROUTES_ENABLED: ${FEATURE_ROUTES_ENABLED:-false}
      FEATURE_ROUTE_GPS_AUTOPLAY_ENABLED: ${FEATURE_ROUTE_GPS_AUTOPLAY_ENABLED:-false}
      FEATURE_OFFLINE_PACKAGES_ENABLED: ${FEATURE_OFFLINE_PACKAGES_ENABLED:-false}
      FEATURE_KNOWLEDGE_GRAPH_ENABLED: ${FEATURE_KNOWLEDGE_GRAPH_ENABLED:-false}
      FEATURE_TIMELINE_ENABLED: ${FEATURE_TIMELINE_ENABLED:-false}
      FEATURE_QR_CAMPAIGNS_ENABLED: ${FEATURE_QR_CAMPAIGNS_ENABLED:-false}
      FEATURE_CONDITION_REGISTRY_ENABLED: ${FEATURE_CONDITION_REGISTRY_ENABLED:-false}
      FEATURE_COMMUNITY_ARCHIVE_ENABLED: ${FEATURE_COMMUNITY_ARCHIVE_ENABLED:-false}
      FEATURE_EDUCATION_ENABLED: ${FEATURE_EDUCATION_ENABLED:-false}
      FEATURE_MULTILINGUAL_ENABLED: ${FEATURE_MULTILINGUAL_ENABLED:-false}
      FEATURE_AI_GUIDE_ENABLED: ${FEATURE_AI_GUIDE_ENABLED:-false}
      FEATURE_PARTNER_PORTAL_ENABLED: ${FEATURE_PARTNER_PORTAL_ENABLED:-false}
      FEATURE_AR_ENABLED: ${FEATURE_AR_ENABLED:-false}
      UPLOADS_DIR: /data/uploads
      UPLOAD_CLEANUP_GRACE_HOURS: ${UPLOAD_CLEANUP_GRACE_HOURS:-24}
      NODE_ENV: production
    volumes:
      - uploads:/data/uploads
    depends_on:
      db:
        condition: service_healthy
    expose:
      - "3000"
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O /dev/null http://127.0.0.1:3000/api/health"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./tiles/data:/var/www/tiles:ro
      - uploads:/var/www/uploads:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      app:
        condition: service_healthy
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # One-shot maintenance service; запускается только через профиль maintenance.
  certbot:
    image: certbot/certbot:v5.7.0
    profiles: ["maintenance"]
    restart: "no"
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  pgdata:
  uploads:
  certbot_www:
  certbot_conf:
