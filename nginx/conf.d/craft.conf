# Замените example.ru на реальный домен.
# Первичный выпуск сертификата: временно закомментируйте блок server 443
# (сертификата ещё нет — nginx не стартует), запустите nginx, получите сертификат
# через certbot (webroot /var/www/certbot), верните блок и `nginx -s reload`.
# Подробно — README.md, раздел «Прод».

server {
    listen 80;
    server_name example.ru;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name example.ru;

    ssl_certificate     /etc/letsencrypt/live/example.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/example.ru/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 20m;

    gzip on;
    gzip_types application/json application/geo+json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # Фото объектов (docker volume uploads)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # PMTiles-подложка — nginx отдаёт статику с поддержкой Range-запросов из коробки
    location /tiles/ {
        alias /var/www/tiles/;
        expires 7d;
        add_header Cache-Control "public";
    }

    # Кириллические глифы для MapLibre (tiles/data/glyphs)
    location /glyphs/ {
        alias /var/www/tiles/glyphs/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
