# Ограничения административных запросов хранятся в общей памяти nginx.
limit_req_zone $binary_remote_addr zone=admin_login:10m rate=5r/m;
limit_conn_zone $binary_remote_addr zone=uploads_per_ip:10m;

# Домен: память.site (punycode xn--80ayho4cq.site).
# Первичный выпуск сертификата: временно закомментируйте блок server 443
# (сертификата ещё нет — nginx не стартует), запустите nginx, получите сертификат
# через certbot (webroot /var/www/certbot), верните блок и `nginx -s reload`.
# Подробно — README.md, раздел «Прод».

server {
    listen 80;
    server_name xn--80ayho4cq.site www.xn--80ayho4cq.site;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl;
    http2 on;
    server_name xn--80ayho4cq.site www.xn--80ayho4cq.site;

    ssl_certificate     /etc/letsencrypt/live/xn--80ayho4cq.site/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/xn--80ayho4cq.site/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;

    client_max_body_size 101m; # 100 МБ файла + небольшой multipart overhead
    limit_req_status 429;
    limit_conn_status 429;

    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), camera=(), microphone=()" always;
    add_header Content-Security-Policy "default-src 'self'; base-uri 'self'; object-src 'none'; frame-ancestors 'none'; form-action 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://tile.openstreetmap.org; media-src 'self' blob:; connect-src 'self' https://tile.openstreetmap.org https://demotiles.maplibre.org; worker-src 'self' blob:; font-src 'self' data:; upgrade-insecure-requests" always;

    gzip on;
    gzip_types application/json application/geo+json application/javascript text/css image/svg+xml;
    gzip_min_length 1024;

    # Фото объектов (docker volume uploads)
    location /uploads/ {
        alias /var/www/uploads/;
        expires 30d;
    }

    # PMTiles-подложка — nginx отдаёт статику с поддержкой Range-запросов из коробки
    location /tiles/ {
        alias /var/www/tiles/;
        expires 7d;
    }

    # Кириллические глифы для MapLibre (tiles/data/glyphs)
    location /glyphs/ {
        alias /var/www/tiles/glyphs/;
        expires 30d;
    }

    location / {
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location = /api/auth/callback/credentials {
        limit_req zone=admin_login burst=5 nodelay;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location ~ ^/api/admin/upload(?:-media|-model)?$ {
        limit_conn uploads_per_ip 2;
        proxy_request_buffering off;
        proxy_pass http://app:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
