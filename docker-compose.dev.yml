# Dev-окружение: только PostGIS, приложение запускается локально (npm run dev)
services:
  db:
    image: postgis/postgis:16-3.4
    restart: unless-stopped
    environment:
      POSTGRES_DB: craft_map
      POSTGRES_USER: craft
      POSTGRES_PASSWORD: craft
    ports:
      - "127.0.0.1:5433:5432"
    volumes:
      - pgdata_dev:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U craft -d craft_map"]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pgdata_dev:
